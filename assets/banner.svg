<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960">

  <!-- bg -->
  <rect width="960" height="320" fill="#0d1117"/>

  <!-- eyebrow -->
  <text x="40" y="52"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="11" font-weight="500" fill="#58a6ff" letter-spacing="1">// development story</text>

  <!-- title: skill-trace -->
  <text y="102"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="42" font-weight="700" letter-spacing="-1.5">
    <tspan x="40" fill="#e6edf3">skill-</tspan><tspan fill="#58a6ff">trace</tspan>
  </text>

  <!-- tagline -->
  <text x="40" y="133"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="15" fill="#7d8590">A Claude Code plugin that turns scattered per-project lessons</text>
  <text x="40" y="153"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="15" fill="#7d8590">into a searchable, always-available knowledge base.</text>

  <!-- pill: v1.2.0 -->
  <rect x="862" y="36" width="58" height="22" rx="11"
    fill="rgba(88,166,255,0.07)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="891" y="52"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="11" fill="#58a6ff" text-anchor="middle">v1.2.0</text>

  <!-- pill: date -->
  <rect x="836" y="65" width="84" height="22" rx="11"
    fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="878" y="81"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="11" fill="#7d8590" text-anchor="middle">2026-06-10</text>

  <!-- pill: author -->
  <rect x="781" y="94" width="139" height="22" rx="11"
    fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="850" y="110"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="11" fill="#7d8590" text-anchor="middle">Nidhin Dileepkumar</text>

  <!-- pill: license -->
  <rect x="829" y="123" width="91" height="22" rx="11"
    fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="874" y="139"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="11" fill="#7d8590" text-anchor="middle">MIT License</text>

  <!-- divider -->
  <line x1="40" y1="174" x2="920" y2="174" stroke="#30363d" stroke-width="1"/>

  <!-- stats cards — 3 cards, evenly distributed -->
  <!-- card 1: zero deps -->
  <rect x="40"  y="194" width="284" height="82" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="182" y="235"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="22" font-weight="700" fill="#58a6ff" text-anchor="middle">zero deps</text>
  <text x="182" y="258"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="11" fill="#7d8590" text-anchor="middle">no npm install needed</text>

  <!-- card 2: viewer port -->
  <rect x="336" y="194" width="284" height="82" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="478" y="238"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="30" font-weight="700" fill="#58a6ff" text-anchor="middle">38888</text>
  <text x="478" y="258"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="11" fill="#7d8590" text-anchor="middle">viewer port</text>

  <!-- card 3: sync latency -->
  <rect x="632" y="194" width="284" height="82" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="774" y="238"
    font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
    font-size="30" font-weight="700" fill="#58a6ff" text-anchor="middle">&lt;500ms</text>
  <text x="774" y="258"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="11" fill="#7d8590" text-anchor="middle">sync latency</text>

</svg>
