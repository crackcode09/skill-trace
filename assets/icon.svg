<?xml version="1.0" encoding="UTF-8"?>
<!--
  skill-trace brand mark — the canonical "trace" glyph (execution trace / skill trail).
  SINGLE SOURCE OF TRUTH for the logo and favicon. Vector → crisp at any size.
  Renders at 512×512 by default; scale freely via width/height or CSS.
  The viewer header (viewer/public/index.html .brand-icon) and the favicon
  data-URI mirror this artwork — keep them in sync with this file.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 20 20" fill="none" role="img" aria-label="skill-trace">
  <title>skill-trace</title>
  <circle cx="4"  cy="10" r="2" fill="#58a6ff"/>
  <circle cx="10" cy="5"  r="2" fill="#58a6ff" opacity="0.7"/>
  <circle cx="16" cy="10" r="2" fill="#58a6ff" opacity="0.5"/>
  <circle cx="10" cy="15" r="2" fill="#58a6ff" opacity="0.35"/>
  <path d="M6 10 Q10 5 14 10"  stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M6 10 Q10 15 14 10" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.25"/>
</svg>
