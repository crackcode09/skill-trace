<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900">
  <defs>
    <clipPath id="roundedApp">
      <rect width="900" height="520" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedApp)">

    <!-- App background -->
    <rect width="900" height="520" fill="#0d1117"/>

    <!-- ── Topbar ──────────────────────────────────────────── -->
    <rect width="900" height="48" fill="#161b22"/>
    <line x1="0" y1="48" x2="900" y2="48" stroke="#30363d" stroke-width="1"/>

    <!-- Brand icon (lightning bolt) -->
    <polygon points="22,14 16,27 21,27 19,34 25,21 20,21" fill="#58a6ff"/>

    <!-- Brand name -->
    <text x="34" y="29"
      font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif"
      font-size="14" font-weight="600" fill="#e6edf3">skill-<tspan fill="#58a6ff">trace</tspan></text>

    <!-- Search bar -->
    <rect x="130" y="12" width="560" height="24" rx="6"
      fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <!-- search icon -->
    <circle cx="145" cy="24" r="5" fill="none" stroke="#484f58" stroke-width="1.5"/>
    <line x1="149" y1="28" x2="152" y2="31" stroke="#484f58" stroke-width="1.5"/>
    <text x="160" y="28"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#484f58">search skills…</text>

    <!-- Refresh button -->
    <rect x="706" y="12" width="24" height="24" rx="5"
      fill="none" stroke="#30363d" stroke-width="1"/>
    <path d="M713 18 a6 6 0 1 1 -2 4.5" fill="none" stroke="#7d8590" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="711,16 715,18 711,20" fill="#7d8590"/>

    <!-- Entry count badge -->
    <rect x="742" y="15" width="42" height="18" rx="9"
      fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.25)" stroke-width="1"/>
    <text x="763" y="27"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="11" fill="#58a6ff" text-anchor="middle">7 skills</text>

    <!-- Port badge -->
    <rect x="796" y="15" width="54" height="18" rx="9"
      fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="823" y="27"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="11" fill="#7d8590" text-anchor="middle">:38888</text>

    <!-- ── Projects sidebar ───────────────────────────────── -->
    <rect x="0" y="48" width="168" height="472" fill="#161b22"/>
    <line x1="168" y1="48" x2="168" y2="520" stroke="#30363d" stroke-width="1"/>

    <!-- Sidebar header -->
    <text x="16" y="74"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" font-weight="600" letter-spacing="0.8" fill="#484f58">PROJECTS</text>

    <!-- All projects — active -->
    <rect x="8" y="82" width="152" height="30" rx="6" fill="#1f6feb"/>
    <circle cx="24" cy="97" r="4" fill="#58a6ff" opacity="0.9"/>
    <text x="36" y="101"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#e6edf3">All projects</text>
    <rect x="130" y="88" width="22" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text x="141" y="100"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" fill="#e6edf3" text-anchor="middle">7</text>

    <!-- rma project -->
    <rect x="8" y="118" width="152" height="30" rx="6" fill="transparent"/>
    <circle cx="24" cy="133" r="4" fill="#3fb950" opacity="0.7"/>
    <text x="36" y="137"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">rma</text>
    <rect x="130" y="124" width="22" height="16" rx="8" fill="#21262d"/>
    <text x="141" y="136"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" fill="#7d8590" text-anchor="middle">4</text>

    <!-- skill-trace project -->
    <rect x="8" y="154" width="152" height="30" rx="6" fill="transparent"/>
    <circle cx="24" cy="169" r="4" fill="#d29922" opacity="0.7"/>
    <text x="36" y="173"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">skill-trace</text>
    <rect x="122" y="160" width="30" height="16" rx="8" fill="#21262d"/>
    <text x="137" y="172"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" fill="#7d8590" text-anchor="middle">3</text>

    <!-- ── Entry list ─────────────────────────────────────── -->
    <rect x="168" y="48" width="290" height="472" fill="#0d1117"/>
    <line x1="458" y1="48" x2="458" y2="520" stroke="#30363d" stroke-width="1"/>

    <!-- Entry list header -->
    <text x="184" y="74"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" font-weight="600" letter-spacing="0.8" fill="#484f58">ALL SKILLS</text>

    <!-- Entry 1 — selected -->
    <rect x="168" y="82" width="290" height="66" fill="#1c2128"/>
    <line x1="168" y1="82" x2="168" y2="148" stroke="#58a6ff" stroke-width="3"/>
    <line x1="168" y1="148" x2="458" y2="148" stroke="#30363d" stroke-width="1"/>
    <text x="184" y="103"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#e6edf3">HTMX partial detection</text>
    <text x="184" y="120"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">Routes serving both full pages and HTMX</text>
    <text x="184" y="135"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">partials need header detection.</text>
    <rect x="352" y="94" width="70" height="15" rx="4" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.25)" stroke-width="1"/>
    <text x="387" y="105"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="9" fill="#3fb950" text-anchor="middle">rma</text>
    <text x="184" y="142"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" fill="#484f58">2026-06-10</text>

    <!-- Entry 2 -->
    <rect x="168" y="148" width="290" height="64" fill="transparent"/>
    <line x1="168" y1="212" x2="458" y2="212" stroke="#21262d" stroke-width="1"/>
    <text x="184" y="169"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#c9d1d9">Zero-dep viewer server</text>
    <text x="184" y="186"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">better-sqlite3 fails on Node 22 and</text>
    <text x="184" y="200"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">blocks Mac users entirely.</text>
    <rect x="330" y="160" width="92" height="15" rx="4" fill="rgba(210,153,34,0.1)" stroke="rgba(210,153,34,0.25)" stroke-width="1"/>
    <text x="376" y="171"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="9" fill="#d29922" text-anchor="middle">skill-trace</text>

    <!-- Entry 3 -->
    <rect x="168" y="212" width="290" height="64" fill="transparent"/>
    <line x1="168" y1="276" x2="458" y2="276" stroke="#21262d" stroke-width="1"/>
    <text x="184" y="233"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#c9d1d9">A2 overlay merge pattern</text>
    <text x="184" y="250"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">SyteLine is read-only. Overlay rows</text>
    <text x="184" y="264"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">created lazily on first QA action.</text>
    <rect x="352" y="224" width="70" height="15" rx="4" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.25)" stroke-width="1"/>
    <text x="387" y="235"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="9" fill="#3fb950" text-anchor="middle">rma</text>

    <!-- Entry 4 -->
    <rect x="168" y="276" width="290" height="60" fill="transparent"/>
    <line x1="168" y1="336" x2="458" y2="336" stroke="#21262d" stroke-width="1"/>
    <text x="184" y="296"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#c9d1d9">fs.watch debounce pattern</text>
    <text x="184" y="313"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">fs.watch fires multiple events per</text>
    <text x="184" y="327"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="11" fill="#7d8590">save. Debounce 500ms collapses them.</text>
    <rect x="330" y="287" width="92" height="15" rx="4" fill="rgba(210,153,34,0.1)" stroke="rgba(210,153,34,0.25)" stroke-width="1"/>
    <text x="376" y="298"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="9" fill="#d29922" text-anchor="middle">skill-trace</text>

    <!-- Faded entries below -->
    <rect x="168" y="336" width="290" height="184" fill="transparent"/>
    <text x="184" y="358"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#484f58">Better-sqlite3 native compile…</text>
    <line x1="168" y1="372" x2="458" y2="372" stroke="#21262d" stroke-width="1"/>
    <text x="184" y="394"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#484f58">HTMX hx-request guard pattern</text>
    <line x1="168" y1="408" x2="458" y2="408" stroke="#21262d" stroke-width="1"/>
    <text x="184" y="430"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="500" fill="#484f58">SQLite WAL mode for concurrent…</text>

    <!-- ── Detail pane ─────────────────────────────────────── -->
    <rect x="458" y="48" width="442" height="472" fill="#0d1117"/>

    <!-- Detail header -->
    <rect x="458" y="48" width="442" height="60" fill="#161b22"/>
    <line x1="458" y1="108" x2="900" y2="108" stroke="#30363d" stroke-width="1"/>
    <text x="478" y="74"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="16" font-weight="600" fill="#e6edf3">HTMX partial detection</text>
    <rect x="478" y="82" width="70" height="16" rx="8"
      fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.25)" stroke-width="1"/>
    <text x="513" y="93"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" fill="#3fb950" text-anchor="middle">rma</text>
    <text x="560" y="93"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="11" fill="#484f58">2026-06-10</text>

    <!-- Problem section -->
    <text x="478" y="136"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" font-weight="600" letter-spacing="0.8" fill="#484f58">PROBLEM</text>
    <rect x="478" y="144" width="402" height="2" fill="#21262d"/>
    <text x="478" y="166"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">Routes that serve both full pages and HTMX partials</text>
    <text x="478" y="184"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">need to detect which is being requested. Without</text>
    <text x="478" y="202"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">detection, HTMX gets a full page response and</text>
    <text x="478" y="220"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">swaps the entire layout into the target div.</text>

    <!-- Solution section -->
    <text x="478" y="250"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" font-weight="600" letter-spacing="0.8" fill="#484f58">SOLUTION</text>
    <rect x="478" y="258" width="402" height="2" fill="#21262d"/>
    <text x="478" y="280"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">Check the </text>
    <rect x="548" y="267" width="110" height="18" rx="3" fill="#1c2128"/>
    <text x="554" y="280"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#79c0ff">hx-request</text>
    <text x="662" y="280"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9"> header — HTMX sets it on</text>
    <text x="478" y="298"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">every partial request.</text>

    <!-- Code block -->
    <rect x="478" y="312" width="402" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="494" y="333"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#7d8590">if</text>
    <text x="508" y="333"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9"> (req.headers[</text>
    <text x="614" y="333"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#79c0ff">'hx-request'</text>
    <text x="693" y="333"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9">]) {'{}'[0]}</text>
    <text x="494" y="351"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9">  </text>
    <text x="506" y="351"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#7d8590">return</text>
    <text x="542" y="351"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9"> res.render(</text>
    <text x="618" y="351"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#79c0ff">'partials/list'</text>
    <text x="712" y="351"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9">);</text>
    <text x="494" y="369"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#c9d1d9">}</text>

    <!-- Takeaway section -->
    <text x="478" y="410"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="10" font-weight="600" letter-spacing="0.8" fill="#484f58">TAKEAWAY</text>
    <rect x="478" y="418" width="402" height="2" fill="#21262d"/>
    <text x="478" y="440"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">Always check </text>
    <rect x="558" y="428" width="138" height="18" rx="3" fill="#1c2128"/>
    <text x="564" y="441"
      font-family="ui-monospace,Consolas,'Liberation Mono',monospace"
      font-size="12" fill="#79c0ff">req.headers['hx-request']</text>
    <text x="700" y="441"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9"> before</text>
    <text x="478" y="460"
      font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
      font-size="13" fill="#c9d1d9">rendering a full layout vs. a fragment.</text>

    <!-- Window chrome dots (top-left) -->
    <circle cx="14" cy="12" r="5" fill="#ff5f57"/>
    <circle cx="30" cy="12" r="5" fill="#febc2e"/>
    <circle cx="46" cy="12" r="5" fill="#28c840"/>

  </g>

  <!-- Outer border -->
  <rect width="900" height="520" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

</svg>
