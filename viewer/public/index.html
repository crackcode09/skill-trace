<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Skills Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
  min-height: 46px;
}
.topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: #f0f6fc;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.topbar-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.search-wrap {
  flex: 1;
  position: relative;
  max-width: 400px;
}
.search-wrap svg {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: #484f58;
  pointer-events: none;
  width: 14px;
  height: 14px;
}
#search {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 5px 10px 5px 28px;
  color: #c9d1d9;
  font-size: 13px;
  outline: none;
  line-height: 1.4;
}
#search:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,.1); }
#search::placeholder { color: #484f58; }
.topbar-status {
  font-size: 11px;
  color: #484f58;
  white-space: nowrap;
}

/* ── Columns ── */
.columns {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Projects ── */
.col-projects {
  width: 180px;
  flex-shrink: 0;
  background: #161b22;
  border-right: 1px solid #30363d;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.col-label {
  padding: 10px 12px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: #484f58;
  text-transform: uppercase;
  flex-shrink: 0;
}
.project-item {
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 5px;
  margin: 1px 5px;
  gap: 4px;
  min-height: 30px;
  border: 1px solid transparent;
}
.project-item:hover { background: #1c2128; border-color: #30363d; }
.project-item.active { background: #1f6feb; color: #fff; border-color: transparent; }
.project-name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.project-count {
  font-size: 10px;
  background: rgba(255,255,255,.12);
  border-radius: 10px;
  padding: 1px 6px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.project-item.active .project-count { background: rgba(255,255,255,.25); }

/* ── Entries ── */
.col-entries {
  width: 240px;
  flex-shrink: 0;
  border-right: 1px solid #30363d;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.entries-header {
  padding: 10px 12px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: #484f58;
  text-transform: uppercase;
  position: sticky;
  top: 0;
  background: #0d1117;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  z-index: 1;
}
.entry-item {
  padding: 10px 12px;
  border-bottom: 1px solid #21262d;
  cursor: pointer;
  border-left: 3px solid transparent;
  flex-shrink: 0;
}
.entry-item:hover { background: #161b22; }
.entry-item.active { background: #161b22; border-left-color: #58a6ff; }
.entry-title {
  font-size: 12px;
  font-weight: 500;
  color: #e6edf3;
  line-height: 1.4;
  margin-bottom: 3px;
}
.entry-date {
  font-size: 10px;
  color: #484f58;
  font-variant-numeric: tabular-nums;
}
.entry-proj-tag {
  display: inline-block;
  font-size: 9px;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 3px;
  padding: 1px 4px;
  color: #8b949e;
  margin-top: 3px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.empty-state {
  padding: 32px 12px;
  font-size: 12px;
  color: #484f58;
  text-align: center;
  line-height: 1.6;
}

/* ── Detail ── */
.col-detail {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  min-width: 0;
}
.detail-placeholder {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #484f58;
  font-size: 13px;
  text-align: center;
  flex-direction: column;
  gap: 8px;
}
.detail-placeholder svg { opacity: .3; }
.detail-title {
  font-size: 18px;
  font-weight: 600;
  color: #f0f6fc;
  line-height: 1.3;
  margin-bottom: 10px;
}
.detail-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.badge {
  font-size: 11px;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 3px 8px;
  color: #8b949e;
}
.badge.date { color: #58a6ff; border-color: rgba(88,166,255,.3); background: rgba(88,166,255,.05); }
.section { margin-bottom: 22px; }
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #58a6ff;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(88,166,255,.15);
}
.section-body {
  font-size: 13px;
  color: #c9d1d9;
  line-height: 1.7;
}
.section-body strong { color: #e6edf3; font-weight: 600; }
.section-body code {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 11.5px;
  color: #79c0ff;
}

/* ── Footer ── */
.footer {
  padding: 5px 16px;
  background: #161b22;
  border-top: 1px solid #30363d;
  font-size: 10px;
  color: #484f58;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-shrink: 0;
}
.footer a { color: #484f58; text-decoration: none; }
.footer a:hover { color: #8b949e; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }

/* ── Loading shimmer ── */
@keyframes shimmer { from { opacity: .4; } to { opacity: .8; } }
.loading { animation: shimmer 1s ease-in-out infinite alternate; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <svg class="topbar-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 2L12.09 7.26L18 8.27L14 12.14L14.95 18L10 15.27L5.05 18L6 12.14L2 8.27L7.91 7.26L10 2Z" fill="#58a6ff" stroke="#58a6ff" stroke-width="1" stroke-linejoin="round"/>
    </svg>
    Global Skills Log
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.406a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input type="text" id="search" placeholder="Search entries..." autocomplete="off" spellcheck="false">
  </div>
  <div class="topbar-status" id="topbarStatus">Loading…</div>
</div>

<div class="columns">
  <div class="col-projects" id="projectList">
    <div class="col-label">Projects</div>
    <div class="empty-state loading">Loading…</div>
  </div>
  <div class="col-entries" id="entryList">
    <div class="entries-header" id="entriesHeader">Entries</div>
  </div>
  <div class="col-detail" id="detailPanel">
    <div class="detail-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Select an entry to view details
    </div>
  </div>
</div>

<div class="footer">
  <a href="http://localhost:38888" target="_blank">http://localhost:38888</a>
  <span id="footerCount"></span>
</div>

<script>
'use strict';

let allSkills    = [];
let filtered     = [];
let activeProject = 'All';
let activeId      = null;
let searchTimer   = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────

async function fetchSkills(q = '', project = '') {
  const p = new URLSearchParams();
  if (q)                        p.set('q', q);
  if (project && project !== 'All') p.set('project', project);
  const res = await fetch('/api/skills?' + p.toString());
  return res.json();
}

// ── Render: projects ──────────────────────────────────────────────────────────

function buildProjectCounts(skills) {
  const c = {};
  for (const s of allSkills) c[s.project] = (c[s.project] || 0) + 1;
  return c;
}

function renderProjects(visibleSkills) {
  const counts = buildProjectCounts(allSkills);
  const projects = Object.keys(counts).sort();
  const list = document.getElementById('projectList');
  list.innerHTML = '<div class="col-label">Projects</div>';

  list.appendChild(makeProjectItem('All', allSkills.length, activeProject === 'All'));
  for (const p of projects) {
    const visCount = visibleSkills.filter(s => s.project === p).length;
    list.appendChild(makeProjectItem(p, visCount, activeProject === p));
  }
}

function makeProjectItem(name, count, active) {
  const div = document.createElement('div');
  div.className = 'project-item' + (active ? ' active' : '');
  div.setAttribute('role', 'button');
  div.setAttribute('tabindex', '0');
  div.setAttribute('aria-label', `Filter by ${name}, ${count} entries`);
  div.innerHTML = `<span class="project-name">${esc(name)}</span><span class="project-count">${count}</span>`;
  const select = () => selectProject(name);
  div.addEventListener('click', select);
  div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });
  return div;
}

// ── Render: entries ───────────────────────────────────────────────────────────

function renderEntries(skills) {
  const list = document.getElementById('entryList');
  // Keep sticky header
  const header = document.getElementById('entriesHeader');
  list.innerHTML = '';
  list.appendChild(header);

  const count = skills.length;
  document.getElementById('footerCount').textContent = `${count} entr${count === 1 ? 'y' : 'ies'} · global-skills v1.1.0`;
  document.getElementById('topbarStatus').textContent = count > 0 ? `${count} entries` : 'No entries';

  if (!count) {
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    msg.textContent = activeProject !== 'All'
      ? `No entries in ${activeProject}`
      : document.getElementById('search').value ? 'No matches found' : 'No entries yet';
    list.appendChild(msg);
    if (!document.getElementById('detailPanel').querySelector('.detail-placeholder')) {
      document.getElementById('detailPanel').innerHTML = '<div class="detail-placeholder">No entries found</div>';
    }
    return;
  }

  for (const s of skills) {
    const div = document.createElement('div');
    div.className = 'entry-item' + (s.id === activeId ? ' active' : '');
    div.dataset.id = s.id;
    div.setAttribute('role', 'button');
    div.setAttribute('tabindex', '0');
    div.setAttribute('aria-label', s.title);
    div.innerHTML = `
      <div class="entry-title">${esc(s.title)}</div>
      <div class="entry-date">${s.date}</div>
      ${activeProject === 'All' ? `<div class="entry-proj-tag">${esc(s.project)}</div>` : ''}
    `;
    const select = () => selectEntry(s);
    div.addEventListener('click', select);
    div.addEventListener('keydown', e => { if (e.key === 'Enter') select(); });
    list.appendChild(div);
  }
}

// ── Render: detail ────────────────────────────────────────────────────────────

function renderDetail(s) {
  const panel = document.getElementById('detailPanel');
  const sections = [
    ['Problem',  s.problem],
    ['Solution', s.solution],
    ['Takeaway', s.takeaway],
  ].filter(([, v]) => v);

  panel.innerHTML = `
    <div class="detail-title">${esc(s.title)}</div>
    <div class="detail-badges">
      <span class="badge">${esc(s.project)}</span>
      <span class="badge date">${s.date}</span>
    </div>
    ${sections.map(([label, text]) => `
      <div class="section">
        <div class="section-label">${label}</div>
        <div class="section-body">${renderMd(esc(text))}</div>
      </div>
    `).join('')}
  `;
}

function renderMd(html) {
  return html
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\n\n+/g, '</p><p style="margin-top:10px">')
    .replace(/\n/g, '<br>');
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Interactions ──────────────────────────────────────────────────────────────

async function selectProject(name) {
  activeProject = name;
  activeId = null;
  const q = document.getElementById('search').value.trim();
  filtered = await fetchSkills(q, name === 'All' ? '' : name);
  renderProjects(filtered);
  renderEntries(filtered);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Select an entry to view details
    </div>
  `;
}

function selectEntry(s) {
  activeId = s.id;
  document.querySelectorAll('.entry-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.id) === activeId);
  });
  renderDetail(s);
}

// ── Search ────────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = e.target.value.trim();
    const proj = activeProject === 'All' ? '' : activeProject;
    filtered = await fetchSkills(q, proj);
    renderEntries(filtered);
    renderProjects(filtered);
  }, 250);
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
    document.getElementById('search').select();
  }
  if (e.key === 'Escape') {
    const searchEl = document.getElementById('search');
    if (searchEl.value) {
      searchEl.value = '';
      searchEl.dispatchEvent(new Event('input'));
    }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    allSkills = await fetchSkills();
    filtered  = allSkills;
    renderProjects(allSkills);
    renderEntries(allSkills);
    if (allSkills.length > 0) renderDetail(allSkills[0]), (activeId = allSkills[0].id),
      document.querySelector('.entry-item')?.classList.add('active');
  } catch (err) {
    document.getElementById('projectList').innerHTML = '<div class="col-label">Projects</div><div class="empty-state">Server not running</div>';
    document.getElementById('topbarStatus').textContent = 'Offline';
  }
}

init();
</script>
</body>
</html>
