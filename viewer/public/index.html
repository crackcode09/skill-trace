<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skill-trace</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2020%2020%22%3E%3Ccircle%20cx%3D%224%22%20cy%3D%2210%22%20r%3D%222%22%20fill%3D%22%2358a6ff%22%2F%3E%3Ccircle%20cx%3D%2210%22%20cy%3D%225%22%20r%3D%222%22%20fill%3D%22%2358a6ff%22%20opacity%3D%220.7%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2210%22%20r%3D%222%22%20fill%3D%22%2358a6ff%22%20opacity%3D%220.5%22%2F%3E%3Ccircle%20cx%3D%2210%22%20cy%3D%2215%22%20r%3D%222%22%20fill%3D%22%2358a6ff%22%20opacity%3D%220.35%22%2F%3E%3Cpath%20d%3D%22M6%2010%20Q10%205%2014%2010%22%20stroke%3D%22%2358a6ff%22%20stroke-width%3D%221.2%22%20fill%3D%22none%22%20opacity%3D%220.5%22%2F%3E%3Cpath%20d%3D%22M6%2010%20Q10%2015%2014%2010%22%20stroke%3D%22%2358a6ff%22%20stroke-width%3D%221.2%22%20fill%3D%22none%22%20opacity%3D%220.25%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap">
<style>
/* ── Design tokens ── */
:root {
  --bg:           #0d1117;
  --surface:      #161b22;
  --surface-alt:  #1c2128;
  --border:       #30363d;
  --border-muted: #21262d;
  --text:         #e6edf3;
  --text-body:    #c9d1d9;
  --text-muted:   #7d8590;   /* fixed from #484f58 — passes WCAG AA 4.6:1 */
  --text-faint:   #484f58;   /* decorative / non-essential only */
  --accent:       #58a6ff;
  --accent-dim:   rgba(88,166,255,.12);
  --active-bg:    #1f6feb;
  --amber:        #d29922;
  --amber-dim:    rgba(210,153,34,.1);
  --green:        #3fb950;
  --green-dim:    rgba(63,185,80,.1);
  --code-fg:      #79c0ff;
  --shadow-sm:    0 1px 3px rgba(0,0,0,.3);
  --trans:        150ms ease;
  --radius:       6px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0ms !important; animation-duration: 0ms !important; }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-body);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  flex-shrink: 0;
}
.brand-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.brand-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 380px;
}
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  width: 14px;
  height: 14px;
}
#search {
  width: 100%;
  height: 32px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 32px 0 30px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color var(--trans), box-shadow var(--trans);
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
#search::placeholder { color: var(--text-muted); }
.search-kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  pointer-events: none;
  line-height: 1.5;
  transition: opacity var(--trans);
}
#search:focus + .search-kbd,
#search:not(:placeholder-shown) + .search-kbd { opacity: 0; }

.topbar-status {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.refresh-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  cursor: pointer;
  transition: color var(--trans), border-color var(--trans), background var(--trans);
}
.refresh-btn:hover { color: var(--text); border-color: var(--text-muted); background: var(--surface-alt); }
.refresh-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.refresh-btn.spinning svg { animation: spin 600ms linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
  .refresh-btn.spinning svg { animation: none; }
}

/* ── Three-column layout ── */
.columns {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Projects column ── */
.col-projects {
  width: 200px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 12px 0;
}

.col-section-label {
  padding: 4px 14px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-faint);
  flex-shrink: 0;
  letter-spacing: 0;
}

.project-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  margin: 1px 8px;
  height: 34px;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background var(--trans), color var(--trans);
  color: var(--text-muted);
  -webkit-user-select: none;
  user-select: none;
}
.project-item:hover { background: rgba(255,255,255,.05); color: var(--text-body); }
.project-item:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.project-item.active {
  background: var(--accent-dim);
  color: var(--accent);
}
.project-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
  opacity: 0.6;
}
.project-item.active .project-dot { opacity: 1; }
.project-name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
}
.project-count {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--text-faint);
  flex-shrink: 0;
  font-weight: 400;
}
.project-item.active .project-count { color: var(--accent); opacity: 0.7; }

/* ── Entries column ── */
.col-entries {
  width: 300px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

.entries-header {
  padding: 12px 14px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border-muted);
  flex-shrink: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.entry-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-muted);
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--trans);
}
.entry-item:hover { background: var(--surface); }
.entry-item.active { background: var(--surface-alt); }
.entry-item:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  border-radius: 2px;
}

.entry-header-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 3px;
}
.entry-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  transition: color var(--trans);
}
.entry-item.active .entry-title { color: var(--accent); }
.entry-date {
  font-size: 11px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  white-space: nowrap;
}
.entry-proj-tag {
  display: inline-block;
  font-size: 11px;
  background: transparent;
  border-radius: 4px;
  padding: 0;
  color: var(--text-muted);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.5;
}
.entry-item.active .entry-proj-tag { color: var(--accent); opacity: 0.7; }

.empty-state {
  padding: 40px 16px;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
}

/* First-run onboarding (empty log, no search/filter) */
.empty-onboard {
  padding: 28px 18px;
  color: var(--text-muted);
  line-height: 1.6;
}
.empty-onboard h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-onboard p { font-size: 13px; margin-bottom: 10px; }
.empty-onboard code { color: var(--code-fg); }
.empty-onboard kbd {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 12px;
  color: var(--text-body);
  font-family: 'JetBrains Mono', monospace;
}
.empty-onboard pre {
  background: var(--bg);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--text-body);
  white-space: pre-wrap;
  overflow-x: auto;
}

/* ── Detail panel ── */
.col-detail {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  min-width: 0;
}

.detail-inner {
  width: 100%;
  max-width: 100%;
  margin: 0;
}

.detail-placeholder {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  flex-direction: column;
  gap: 10px;
}
.detail-placeholder svg { opacity: .25; }
.detail-placeholder p { color: var(--text-muted); }

.detail-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}

.detail-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  color: var(--text-muted);
  font-weight: 500;
}
.badge.date {
  color: var(--accent);
  border-color: rgba(88,166,255,.25);
  background: var(--accent-dim);
}

/* ── Sections ── */
.section {
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid var(--border-muted);
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-muted);
}
.section-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.section[data-type="Problem"] .section-header  { background: var(--amber-dim); }
.section[data-type="Problem"] .section-dot     { background: var(--amber); }
.section[data-type="Problem"] .section-label   { color: var(--amber); }

.section[data-type="Solution"] .section-header { background: var(--green-dim); }
.section[data-type="Solution"] .section-dot    { background: var(--green); }
.section[data-type="Solution"] .section-label  { color: var(--green); }

.section[data-type="Takeaway"] .section-header { background: var(--accent-dim); }
.section[data-type="Takeaway"] .section-dot    { background: var(--accent); }
.section[data-type="Takeaway"] .section-label  { color: var(--accent); }

.section-body {
  font-size: 13px;
  color: var(--text-body);
  line-height: 1.75;
  padding: 14px 16px;
}
.section-body p + p { margin-top: 10px; }
.section-body ul { margin: 0; padding-left: 20px; }
.section-body li { margin: 3px 0; }
.section-body li::marker { color: var(--text-faint); }
.section-body p + ul, .section-body ul + p { margin-top: 10px; }
.section-body strong { color: var(--text); font-weight: 600; }
.section-body code {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 12px;
  color: var(--code-fg);
}

/* ── Footer ── */
.footer {
  padding: 0 16px;
  height: 28px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  align-items: center;
  flex-shrink: 0;
}
.footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color var(--trans);
}
.footer a:hover { color: var(--text-body); }
.footer-sep { color: var(--text-faint); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Loading shimmer ── */
@keyframes shimmer { from { opacity: .35; } to { opacity: .7; } }
.loading { animation: shimmer 1s ease-in-out infinite alternate; }

/* ── Dashboard (group-by-Stack overview) ── */
.hidden { display: none !important; }

.dash-toggle {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px; flex-shrink: 0;
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-muted); cursor: pointer; font: inherit; font-size: 12px;
  transition: color var(--trans), border-color var(--trans), background var(--trans);
}
.dash-toggle:hover { color: var(--text); border-color: var(--text-muted); background: var(--surface-alt); }
.dash-toggle.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.dash-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.dashboard {
  flex: 1; overflow-y: auto; min-height: 0;
  padding: 28px 32px; background: var(--bg);
}
.dash-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; margin-bottom: 22px; max-width: 760px;
}
.dash-title { font-size: 15px; font-weight: 600; color: var(--text); }
.dash-total { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.tag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  max-width: 920px;
}
.tag-card {
  display: flex; flex-direction: column; gap: 12px;
  text-align: left; padding: 16px 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer; font: inherit; color: inherit;
  transition: transform 220ms cubic-bezier(.22,1,.36,1),
              border-color var(--trans), background var(--trans), box-shadow var(--trans);
  animation: cardIn 440ms cubic-bezier(.22,1,.36,1) both;
  animation-delay: calc(var(--i) * 32ms);
}
.tag-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  background: var(--surface-alt);
  box-shadow: 0 8px 22px rgba(0,0,0,.38);
}
.tag-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.tag-card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.tag-card-name {
  font-family: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
  font-size: 13px; font-weight: 500; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tag-card-count {
  font-size: 22px; font-weight: 600; color: var(--accent);
  font-variant-numeric: tabular-nums; line-height: 1; flex-shrink: 0;
}
.tag-card-meta { font-size: 11px; color: var(--text-muted); }
.tag-card-preview {
  font-size: 12.5px; color: var(--text-body); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.tag-card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 4px; }
.tag-card-chip {
  font-size: 10.5px; line-height: 1.5; padding: 1px 8px; border-radius: 999px;
  background: var(--surface-alt); border: 1px solid var(--border-muted); color: var(--text-muted);
  max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tag-card-chip.more { color: var(--text-faint); }
.dash-hint { margin-top: 22px; font-size: 12px; color: var(--text-faint); }
@keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  .tag-card { animation: none; }
  .tag-card:hover { transform: none; }
}
</style>
</head>
<body>

<div class="topbar" role="banner">
  <div class="topbar-brand">
    <svg class="brand-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <!-- Trace path — execution trace / skill trail -->
      <circle cx="4" cy="10" r="2" fill="#58a6ff"/>
      <circle cx="10" cy="5" r="2" fill="#58a6ff" opacity="0.7"/>
      <circle cx="16" cy="10" r="2" fill="#58a6ff" opacity="0.5"/>
      <circle cx="10" cy="15" r="2" fill="#58a6ff" opacity="0.35"/>
      <path d="M6 10 Q10 5 14 10" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M6 10 Q10 15 14 10" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.25"/>
    </svg>
    <span class="brand-name">skill-trace</span>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.406a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input
      type="search"
      id="search"
      placeholder="Search entries…"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search skills entries"
    >
    <span class="search-kbd" aria-hidden="true">/</span>
  </div>

  <div class="topbar-status" id="topbarStatus" aria-live="polite">Loading…</div>
  <button type="button" class="dash-toggle" id="dashToggle" aria-pressed="false" title="Group lessons by Stack tag">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="4" y1="20" x2="4" y2="13"/><line x1="10" y1="20" x2="10" y2="5"/><line x1="16" y1="20" x2="16" y2="10"/>
    </svg>
    Dashboard
  </button>
  <button type="button" class="refresh-btn" id="refreshBtn" title="Re-sync from global-skills.md" aria-label="Refresh skills database">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>
</div>

<div class="columns" role="main">
  <nav class="col-projects" id="projectList" aria-label="Project filter">
    <div class="col-section-label">Projects</div>
    <div class="empty-state loading">Loading…</div>
  </nav>

  <div class="col-entries" id="entryList" aria-label="Skill entries">
    <div class="entries-header" id="entriesHeader">Entries</div>
  </div>

  <article class="col-detail" id="detailPanel" aria-label="Entry detail">
    <div class="detail-placeholder">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5" aria-hidden="true">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Select an entry to view details</p>
    </div>
  </article>
</div>

<section id="dashboard" class="dashboard hidden" aria-label="Lessons by Stack tag"></section>

<footer class="footer" role="contentinfo">
  <a href="http://localhost:38888">http://localhost:38888</a>
  <span class="footer-sep">·</span>
  <span id="footerCount"></span>
</footer>

<script>
'use strict';

let allSkills     = [];
let filtered      = [];
let activeProject = 'All';
let activeStack   = null;
let dashboardMode = false;
let activeId      = null;
let searchTimer   = null;

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return `${MONTHS[m - 1]} ${d}, ${y}`;
}

function renderInline(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

// Render a section body consistently regardless of how the source was wrapped:
// blank lines separate paragraphs; a run of "- " lines becomes a real list;
// single newlines inside a paragraph collapse to spaces (no ragged <br> breaks).
function renderMd(text) {
  return text.split(/\n\n+/).map(block => {
    // A block is a bullet list if its first non-empty line starts with "- ".
    // Continuation lines (wrapped bullets) fold into the current item.
    if (/^\s*-\s+/.test(block.trimStart())) {
      const items = [];
      for (const line of block.split('\n')) {
        if (/^\s*-\s+/.test(line)) items.push(line.replace(/^\s*-\s+/, '').trim());
        else if (items.length && line.trim()) items[items.length - 1] += ' ' + line.trim();
      }
      return `<ul>${items.map(it => `<li>${renderInline(it)}</li>`).join('')}</ul>`;
    }
    return `<p>${renderInline(block.replace(/\s*\n\s*/g, ' ').trim())}</p>`;
  }).join('');
}

// ── Fetch ─────────────────────────────────────────────────────────────────────

async function fetchSkills(q = '', project = '') {
  const p = new URLSearchParams();
  if (q) p.set('q', q);
  if (project && project !== 'All') p.set('project', project);
  const res = await fetch('/api/skills?' + p.toString());
  return res.json();
}

// ── Projects ──────────────────────────────────────────────────────────────────

function renderProjects(visibleSkills) {
  const counts = {};
  for (const s of allSkills) for (const p of s.projects) counts[p] = (counts[p] || 0) + 1;
  const projects = Object.keys(counts).sort();

  const list = document.getElementById('projectList');
  list.innerHTML = '<div class="col-section-label">Projects</div>';
  list.appendChild(makeProjectItem('All', allSkills.length, activeProject === 'All'));
  for (const proj of projects) {
    const vis = visibleSkills.filter(s => s.projects.includes(proj)).length;
    list.appendChild(makeProjectItem(proj, vis, activeProject === proj));
  }
}

function makeProjectItem(name, count, active) {
  const el = document.createElement('div');
  el.className = 'project-item' + (active ? ' active' : '');
  el.setAttribute('role', 'button');
  el.setAttribute('tabindex', '0');
  el.setAttribute('aria-pressed', active ? 'true' : 'false');
  el.setAttribute('aria-label', `${name} — ${count} ${count === 1 ? 'entry' : 'entries'}`);
  el.innerHTML = `<span class="project-dot"></span><span class="project-name">${esc(name)}</span><span class="project-count">${count}</span>`;
  const select = () => selectProject(name);
  el.addEventListener('click', select);
  el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });
  return el;
}

// ── Entries ───────────────────────────────────────────────────────────────────

function renderEntries(skills) {
  const list   = document.getElementById('entryList');
  const header = document.getElementById('entriesHeader');
  list.innerHTML = '';
  header.textContent = activeStack ? `Stack: ${activeStack}` : 'Entries';
  list.appendChild(header);

  const count = skills.length;
  document.getElementById('footerCount').textContent =
    `${count} ${count === 1 ? 'entry' : 'entries'} · skill-trace v1.2.1-dev`;
  document.getElementById('topbarStatus').textContent =
    count > 0 ? `${count} ${count === 1 ? 'entry' : 'entries'}` : 'No entries';

  if (!count) {
    const q = document.getElementById('search').value;
    // First run: the log is genuinely empty (not a no-match search or filter).
    // Show onboarding instead of a dead-end "No entries yet".
    if (!q && activeProject === 'All') {
      const box = document.createElement('div');
      box.className = 'empty-onboard';
      box.innerHTML = `
        <h2>No lessons yet</h2>
        <p>Ask Claude to <kbd>log that</kbd> (or “log this lesson”) in any project —
        the <code>log-lesson</code> skill writes a Problem / Solution / Takeaway
        entry here automatically.</p>
        <p>Or add one to <code>docs/skills.md</code> yourself:</p>
        <pre>## [YYYY-MM-DD] — Short title

**Stack:** node, concurrency

**Problem:** What went wrong.
**Solution:** What fixed it.
**Takeaway:** The reusable rule.</pre>
      `;
      list.appendChild(box);
      document.getElementById('detailPanel').innerHTML =
        '<div class="detail-placeholder"><p>Your lessons will appear here</p></div>';
      return;
    }
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    msg.textContent = q ? `No matches for "${q}"` : `No entries in ${activeProject}`;
    list.appendChild(msg);
    document.getElementById('detailPanel').innerHTML =
      '<div class="detail-placeholder"><p>No entries found</p></div>';
    return;
  }

  for (const s of skills) {
    const el = document.createElement('div');
    el.className = 'entry-item' + (s.id === activeId ? ' active' : '');
    el.dataset.id = s.id;
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', `${s.title}, ${fmtDate(s.date)}`);
    el.innerHTML = `
      <div class="entry-header-row">
        <div class="entry-title">${esc(s.title)}</div>
        <span class="entry-date">${fmtDate(s.date)}</span>
      </div>
      ${activeProject === 'All' ? `<span class="entry-proj-tag">${esc(s.projects.join(', '))}</span>` : ''}
    `;
    const select = () => selectEntry(s);
    el.addEventListener('click', select);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') select(); });
    list.appendChild(el);
  }
}

// ── Detail ────────────────────────────────────────────────────────────────────

function makeSection(type, text) {
  return `
    <div class="section" data-type="${type}">
      <div class="section-header">
        <span class="section-dot" aria-hidden="true"></span>
        <span class="section-label">${type}</span>
      </div>
      <div class="section-body">${renderMd(esc(text))}</div>
    </div>
  `;
}

function renderDetail(s) {
  const sections = [
    ['Problem',  s.problem],
    ['Solution', s.solution],
    ['Takeaway', s.takeaway],
  ].filter(([, v]) => v);

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-inner">
      <h1 class="detail-title">${esc(s.title)}</h1>
      <div class="detail-badges">
        <span class="badge">${esc(s.projects.join(', '))}</span>
        <span class="badge date">${fmtDate(s.date)}</span>
      </div>
      ${sections.map(([type, text]) => makeSection(type, text)).join('')}
    </div>
  `;
}

// ── Interactions ──────────────────────────────────────────────────────────────

async function selectProject(name) {
  activeProject = name;
  activeStack = null;
  activeId = null;
  const q = document.getElementById('search').value.trim();
  filtered = await fetchSkills(q, name === 'All' ? '' : name);
  renderProjects(filtered);
  renderEntries(filtered);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-placeholder">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5" aria-hidden="true">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Select an entry to view details</p>
    </div>
  `;
}

function selectEntry(s) {
  activeId = s.id;
  document.querySelectorAll('.entry-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.id) === activeId);
  });
  renderDetail(s);
}

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q    = e.target.value.trim();
    activeStack = null;
    const proj = activeProject === 'All' ? '' : activeProject;
    filtered   = await fetchSkills(q, proj);
    renderEntries(filtered);
    renderProjects(filtered);
  }, 250);
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    const s = document.getElementById('search');
    s.focus();
    s.select();
  }
  if (e.key === 'Escape') {
    const s = document.getElementById('search');
    if (s.value) { s.value = ''; s.dispatchEvent(new Event('input')); }
  }
});

// ── Dashboard (group by Stack tag) ─────────────────────────────────────────────

function renderDashboard() {
  // Group lessons by Stack tag; keep a count and the most recent lesson title
  // per tag so each card carries real, differentiating information.
  const byTag = {};
  for (const s of allSkills) {
    for (const t of (s.stack || [])) {
      const g = byTag[t] || (byTag[t] = { count: 0, latest: null, projects: new Set() });
      g.count++;
      for (const p of (s.projects || [])) g.projects.add(p);
      if (!g.latest || s.date > g.latest.date) g.latest = { date: s.date, title: s.title };
    }
  }
  const tags = Object.keys(byTag).sort((a, b) => byTag[b].count - byTag[a].count || a.localeCompare(b));
  const dash = document.getElementById('dashboard');

  if (!tags.length) {
    dash.innerHTML =
      '<div class="dash-head"><span class="dash-title">Lessons by Stack tag</span></div>' +
      '<p class="empty-state">No <code>**Stack:**</code> tags yet. Entries written by the ' +
      '<code>log-lesson</code> skill carry a Stack line; once you have a few, they group here.</p>';
    return;
  }

  const cards = tags.map((t, i) => {
    const g = byTag[t];
    const noun = g.count === 1 ? 'lesson' : 'lessons';
    const projs = [...g.projects];
    const shown = projs.slice(0, 3);
    const extra = projs.length - shown.length;
    const chips = shown.map(p => `<span class="tag-card-chip">${esc(p)}</span>`).join('') +
      (extra > 0 ? `<span class="tag-card-chip more">+${extra}</span>` : '');
    const projLabel = projs.length === 1 ? '1 project' : `${projs.length} projects`;
    return `<button type="button" class="tag-card" data-tag="${esc(t)}" style="--i:${i}"
              aria-label="${esc(t)}: ${g.count} ${noun} across ${projLabel}">
        <span class="tag-card-top">
          <span class="tag-card-name">${esc(t)}</span>
          <span class="tag-card-count">${g.count}</span>
        </span>
        <span class="tag-card-meta">${g.count} ${noun} · latest ${fmtDate(g.latest.date)}</span>
        <span class="tag-card-preview">${esc(g.latest.title)}</span>
        <span class="tag-card-chips">${chips}</span>
      </button>`;
  }).join('');

  dash.innerHTML =
    `<div class="dash-head">
       <span class="dash-title">Lessons by Stack tag</span>
       <span class="dash-total">${allSkills.length} lessons · ${tags.length} tags</span>
     </div>
     <div class="tag-grid">${cards}</div>
     <p class="dash-hint">Click a tag to see its lessons.</p>`;

  dash.querySelectorAll('.tag-card').forEach(card => {
    card.addEventListener('click', () => drillStack(card.dataset.tag));
  });
}

function toggleDashboard(on) {
  dashboardMode = on;
  document.getElementById('dashboard').classList.toggle('hidden', !on);
  document.querySelector('.columns').classList.toggle('hidden', on);
  const btn = document.getElementById('dashToggle');
  btn.classList.toggle('active', on);
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  if (on) renderDashboard();
}

function drillStack(tag) {
  activeStack   = tag;
  activeProject = 'All';
  activeId      = null;
  toggleDashboard(false);
  filtered = allSkills.filter(s => (s.stack || []).includes(tag));
  renderProjects(filtered);
  renderEntries(filtered);
}

document.getElementById('dashToggle').addEventListener('click', () => toggleDashboard(!dashboardMode));

// ── Refresh button ────────────────────────────────────────────────────────────

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;
  try {
    await fetch('/api/sync');
    allSkills = await fetchSkills();
    filtered  = allSkills;
    renderProjects(allSkills);
    const q = document.getElementById('search').value.trim();
    if (q) {
      filtered = allSkills.filter(s =>
        [s.title, s.problem, s.solution, s.takeaway, s.projects.join(', ')]
          .some(f => f && f.toLowerCase().includes(q.toLowerCase()))
      );
    }
    renderEntries(filtered);
  } catch {}
  btn.classList.remove('spinning');
  btn.disabled = false;
});

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    allSkills = await fetchSkills();
    filtered  = allSkills;
    renderProjects(allSkills);
    renderEntries(allSkills);
    if (allSkills.length > 0) {
      activeId = allSkills[0].id;
      renderDetail(allSkills[0]);
      document.querySelector('.entry-item')?.classList.add('active');
    }
  } catch {
    document.getElementById('projectList').innerHTML =
      '<div class="col-section-label">Projects</div><div class="empty-state">Server not running</div>';
    document.getElementById('topbarStatus').textContent = 'Offline';
  }
}

init();
</script>
</body>
</html>
